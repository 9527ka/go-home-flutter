org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Djava.net.useSystemProxies=false
android.useAndroidX=true

# Flutter 默认为 android-arm / android-arm64 / android-x64 三个平台编 libflutter.so + libapp.so。
# 本项目只跑真机，x86_64 只模拟器用，编进去白白占 50+MB，默认剔除。
# 需要在 x86 模拟器上测 release 时，显式 `flutter build apk --target-platform=android-arm,android-arm64,android-x64` 覆盖。
target-platform=android-arm,android-arm64
