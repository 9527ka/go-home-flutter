name: go_home
description: 回家了么 - 寻亲平台客户端
publish_to: 'none'
version: 1.0.4+5

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 网络请求
  dio: ^5.4.0

  # 状态管理
  provider: ^6.1.0

  # 本地存储
  shared_preferences: ^2.2.0

  # 图片选择
  image_picker: ^1.0.0

  # 图片剪裁
  image_cropper: ^8.0.0

  # 图片压缩
  flutter_image_compress: ^2.1.0

  # 图片缓存
  cached_network_image: ^3.3.0

  # 下拉刷新
  pull_to_refresh: ^2.0.0

  # Toast 提示
  fluttertoast: ^8.2.0

  # 系统分享
  share_plus: ^7.2.0

  # URL 启动器（拨打电话）
  url_launcher: ^6.2.0

  # Apple 授权登录
  sign_in_with_apple: ^6.1.0
  # Apple 登录所需加密库
  crypto: ^3.0.0

  # 国际化代码生成
  intl: ^0.20.2

  # WebSocket（聊天室）
  web_socket_channel: ^2.4.0

  # 表情选择器
  emoji_picker_flutter: ^1.6.0

  # 视频播放
  video_player: ^2.8.0

  # 录音
  record: ^6.2.0

  # 音频播放（语音消息）
  just_audio: ^0.9.36

  # 文件路径
  path_provider: ^2.1.0

  # 权限请求
  permission_handler: ^11.0.0

  # 定位
  geolocator: ^13.0.2

  # 地图（Apple Maps）
  apple_maps_flutter: ^1.4.0

  # Apple In-App Purchase
  in_app_purchase: ^3.2.0

  audio_session: ^0.1.19

  # 二维码生成（群邀请）
  qr_flutter: ^4.1.0

  # SVG 图标渲染
  flutter_svg: ^2.0.10

  # 保存图片到系统相册（海报保存）
  gal: ^2.3.0

  # 腾讯云 TUICallKit（私聊语音/视频通话 —— 含完整 UI + 信令 + 离线推送）
  # 文档：https://cloud.tencent.com/document/product/647/82985
  tencent_calls_uikit: ^4.0.0

  # UUID（历史保留，部分模块仍在使用）
  uuid: ^4.3.0
  mobile_scanner: ^7.2.0
  sqflite: ^2.4.2
  path: ^1.9.1

dependency_overrides:
  # 修复 objective_c 9.3.0 在模拟器上 native assets 加载失败的问题
  path_provider_foundation: 2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icon/

flutter_launcher_icons:
  android: false
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true

  # 国际化
  # flutter_intl:
  #   enabled: true
